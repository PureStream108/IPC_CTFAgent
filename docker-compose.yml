services:
  ipc-member-image:
    build:
      context: .
      dockerfile: docker/member/Dockerfile
    image: ipc-member:latest
    command: ["true"]
    restart: "no"

  ipc-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ipc-ctfagent:latest
    container_name: ipc-app
    ports:
      - "8000:8000"
    environment:
      - IPC_ROOT=/app
      - IPC_LOG_ENABLED=true
      - IPC_LOG_EXPORT_DIR=/app/exports/logs
      - IPC_WP_EXPORT_DIR=/app/exports/Wp
    volumes:
      - ipc_data:/app/data
      - ipc_memory:/app/memory
      - ipc_wp:/app/wp
      - ipc_runtime_logs:/app/logs
      - ipc_projects:/app/projects
      - ./logs:/app/exports/logs
      - ./Wp:/app/exports/Wp
      - ./backend/config:/app/backend/config
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - ipc-member-image

# Shared MCP services (Browser/Ghidra/ZAP) are integrated in-process as stubs in
# this build; production deployments can add dedicated services here and point
# the shared MCP clients at them.

volumes:
  ipc_data:
  ipc_memory:
  ipc_wp:
  ipc_runtime_logs:
  ipc_projects:
