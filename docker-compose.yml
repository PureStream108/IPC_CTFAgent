services:
  ipc-member-image:
    build:
      context: .
      dockerfile: docker/member/Dockerfile
    image: ipc-member:latest
    command: ["true"]
    restart: "no"

  ipc-zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command:
      - zap.sh
      - -daemon
      - -host
      - 0.0.0.0
      - -port
      - "8080"
      - -config
      - api.disablekey=true
      - -config
      - api.addrs.addr.name=.*
      - -config
      - api.addrs.addr.regex=true
    expose:
      - "8080"
    restart: unless-stopped

  ipc-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ipc-ctfagent:latest
    container_name: ipc-app
    ports:
      - "8000:8000"
    environment:
      - IPC_ROOT=/app
      - IPC_LOG_ENABLED=true
      - IPC_LOG_EXPORT_DIR=/app/exports/logs
      - IPC_WP_EXPORT_DIR=/app/exports/Wp
      - IPC_CHROME_BIN=/usr/bin/chromium
      - IPC_GHIDRA_HEADLESS=/opt/ghidra/support/analyzeHeadless
      - ZAP_API_URL=http://ipc-zap:8080
    volumes:
      - ipc_data:/app/data
      - ipc_memory:/app/memory
      - ipc_wp:/app/wp
      - ipc_runtime_logs:/app/logs
      - ipc_projects:/app/projects
      - ./logs:/app/exports/logs
      - ./Wp:/app/exports/Wp
      - ./backend/config:/app/backend/config
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - ipc-member-image
      - ipc-zap

# Shared MCP runtime:
# - Browser and Ghidra run from binaries bundled in the ipc-app image.
# - ZAP runs as the shared ipc-zap service and is reached through ZAP_API_URL.

volumes:
  ipc_data:
  ipc_memory:
  ipc_wp:
  ipc_runtime_logs:
  ipc_projects:
